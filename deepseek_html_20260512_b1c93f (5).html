<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MovieStream - онлайн кинотеатр | Дипломный проект</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1f3a;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff6b6b;
            border-radius: 10px;
        }

        .header {
            background: linear-gradient(135deg, #0f142e 0%, #1a1f3a 100%);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,107,107,0.3);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            background: #2a2f4a;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .search-box input:focus {
            background: #3a3f5a;
            box-shadow: 0 0 0 2px #ff6b6b;
        }

        .filters {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            background: #2a2f4a;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn.active {
            background: #ff6b6b;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 30px;
            border-left: 4px solid #ff6b6b;
            padding-left: 20px;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .movie-card {
            background: #151a36;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeInUp 0.5s ease;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(255,107,107,0.3);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .movie-poster {
            position: relative;
            padding-top: 150%;
            background-size: cover;
            background-position: center;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .movie-year {
            font-size: 14px;
            color: #ff8e53;
        }

        .movie-type {
            display: inline-block;
            padding: 3px 8px;
            background: #ff6b6b;
            border-radius: 5px;
            font-size: 11px;
            margin-top: 8px;
        }

        .id-selector {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .id-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #2a2f4a;
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }

        .id-badge:hover {
            background: #ff6b6b;
        }

        .id-badge.active {
            background: #ff6b6b;
            box-shadow: 0 0 5px #ff6b6b;
        }

        .domain-selector {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            padding: 10px;
            background: #151a36;
            border-radius: 8px;
        }

        .domain-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #2a2f4a;
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.3s;
        }

        .domain-badge.active {
            background: #4caf50;
            box-shadow: 0 0 5px #4caf50;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1200px;
            margin: 50px auto;
            background: #0f142e;
            border-radius: 12px;
            overflow: hidden;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }

        .close-modal:hover {
            color: #ff6b6b;
        }

        .player-container {
            width: 100%;
            background: #000;
            aspect-ratio: 16/9;
        }

        .player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .movie-detail {
            padding: 20px;
        }

        .seasons-container {
            margin-top: 20px;
            padding: 20px;
            background: #1a1f3a;
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .season-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .season-btn {
            padding: 8px 20px;
            background: #2a2f4a;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .season-btn.active,
        .season-btn:hover {
            background: #ff6b6b;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .episode-btn {
            padding: 10px;
            background: #2a2f4a;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .episode-btn:hover {
            background: #ff6b6b;
        }

        .error-message {
            background: #ff6b6b22;
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 15px;
            margin: 10px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            .nav {
                flex-direction: column;
            }
            .search-box {
                max-width: 100%;
            }
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
            .modal-content {
                width: 95%;
                margin: 20px auto;
            }
        }

        .loader {
            text-align: center;
            padding: 40px;
            font-size: 20px;
            color: #ff6b6b;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="nav">
        <div class="logo" onclick="filterContent('all')">🎬 MovieStream</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск фильмов и сериалов..." onkeyup="searchMovies()">
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="filterContent('all')">Все</button>
            <button class="filter-btn" data-filter="movie" onclick="filterContent('movie')">Фильмы</button>
            <button class="filter-btn" data-filter="series" onclick="filterContent('series')">Сериалы</button>
        </div>
    </div>
</div>

<div class="container">
    <h2 class="section-title">🔥 Популярное</h2>
    <div id="moviesGrid" class="movies-grid">
        <div class="loader">Загрузка контента...</div>
    </div>
</div>

<div id="playerModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closePlayer()">&times;</span>
        <div id="playerContainer" class="player-container">
            <div style="display: flex; align-items: center; justify-content: center; height: 100%; background: #000; color: #fff;">
                🎬 Плеер загружается...
            </div>
        </div>
        <div class="movie-detail" id="movieDetail">
            <h2 id="detailTitle"></h2>
            <p id="detailDesc"></p>
            <div id="domainSelector" class="domain-selector"></div>
            <div id="idSelector" class="id-selector"></div>
        </div>
        <div id="seriesControls"></div>
    </div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    const PLAYER_TOKEN = 'c9fe4f828ec190451e8bb5f66659838d';
    
    // Список доступных доменов (рабочие)
    const PLAYER_DOMAINS = [
        { name: 'TV-1', url: 'https://tv-1-kinoserial.net', active: true },
        { name: 'TV-2', url: 'https://tv-2-kinoserial.net', active: true },
        { name: 'TV-3', url: 'https://tv-3-kinoserial.net', active: true }
    ];
    
    let currentDomain = PLAYER_DOMAINS[0]; // Выбранный домен
    let currentIdType = 'kp_id';
    let currentContent = null;
    let currentSeason = 1;
    let currentFilter = 'all';
    let currentSearch = '';
    
    // Демо-база фильмов/сериалов
    const contentDatabase = [
        { 
            id: 1, 
            title: "Дюна: Часть вторая", 
            year: 2024,

            kp_id: "1395833",
            imdb_id: "tt15239678",
            tmdb_id: "693134",

            description: "Продолжение эпической саги Пола Атрейдеса."
        },
        { 
            id: 2,

            year: 2023, 
            type: "movie",
            kp_id: "1090365",

        },
        { 
            id: 3,

            year: 2023, 
            type: "movie",
            kp_id: "974256",
            imdb_id: "tt1517268",
            tmdb_id: "346698",
            poster: "https://image.tmdb.org/t/p/w500/iuFNMS8U5cb6xfzi51Dbkovj7vM.jpg",

        },
        {

            year: 2023, 
            type: "series",
            kp_id: "531895",
            imdb_id: "tt26547832",

            description: "Байопик о легендарной панк-рок группе.",
            seasons: 1,
            episodes: [8]
        },
        { 
            id: 5, 
            title: "Слово пацана", 
            year: 2023, 
            type: "series",
            kp_id: "534036",
            imdb_id: "tt28455427",
            tmdb_id: "235569",
            poster: "https://image.tmdb.org/t/p/w500/4JZ7K6H8L9M0nBvCXzASDfGhJkL.jpg", 
            description: "Криминальная драма о подростках в Казани.",
            seasons: 1,
            episodes: [8]
        },
        { 
            id: 6, 
            title: "Мастер и Маргарита", 
            year: 2024, 
            type: "movie",
            kp_id: "453249",
            imdb_id: "tt21938778",
            tmdb_id: "1003481",
            poster: "https://image.tmdb.org/t/p/w500/r2J02Z2OpNTctfOSN1YcqairHKU.jpg", 
            description: "Новая экранизация романа Булгакова."
        },
        { 
            id: 7, 
            title: "Майор Гром: Игра", 
            year: 2024, 
            type: "movie",
            kp_id: "507476",
            imdb_id: "tt22351008",
            tmdb_id: "965897",
            poster: "https://image.tmdb.org/t/p/w500/8uUU2QmX6hkNzM6QNd2MlQZKvWV.jpg", 
            description: "Российский супергеройский боевик."
        },
        { 
            id: 8, 
            title: "Теория большого взрыва", 
            year: 2007, 
            type: "series",
            kp_id: "273607",
            imdb_id: "tt0898266",
            tmdb_id: "1418",
            poster: "https://image.tmdb.org/t/p/w500/1E5pS9FKE8qoPZJmBxLqX5yZkZj.jpg", 
            description: "Легендарный ситком о физиках.",
            seasons: 12,
            episodes: [24,24,24,24,24,24,24,24,24,24,24,24]
        }
    ];
    
    // ========== ФУНКЦИЯ ФОРМИРОВАНИЯ URL ПЛЕЕРА ==========
    function getPlayerUrl(item, idType, domain, season = null, episode = null) {
        let idValue = '';
        
        switch(idType) {
            case 'kp_id':
                idValue = item.kp_id;
                break;
            case 'imdb_id':
                idValue = item.imdb_id;
                break;
            case 'tmdb_id':
                idValue = `tmdb${item.tmdb_id}`;
                break;
            default:
                idValue = item.kp_id;
        }
        
        if (!idValue) {
            return null;
        }
        
        // Для сериалов с конкретной серией
        if (item.type === 'series' && season && episode) {
            return `${domain.url}/embed_season/${season}/?token=${PLAYER_TOKEN}&video=s${season}v${episode}`;
        }
        
        // Стандартный embed URL
        return `${domain.url}/embed/${idValue}/?token=${PLAYER_TOKEN}`;
    }
    
    // ========== ЗАГРУЗКА КОНТЕНТА ==========
    function loadContent() {
        const grid = document.getElementById('moviesGrid');
        grid.innerHTML = '<div class="loader">Загрузка...</div>';
        
        let items = [...contentDatabase];
        
        if (currentFilter !== 'all') {
            items = items.filter(item => item.type === currentFilter);
        }
        
        if (currentSearch) {
            items = items.filter(item => 
                item.title.toLowerCase().includes(currentSearch.toLowerCase())
            );
        }
        
        if (items.length === 0) {
            grid.innerHTML = '<div class="error">😔 Ничего не найдено</div>';
            return;
        }
        
        renderMovies(items);
    }
    
    function renderMovies(items) {
        const grid = document.getElementById('moviesGrid');
        grid.innerHTML = items.map(item => `
            <div class="movie-card" onclick="openItem(${item.id})">
                <div class="movie-poster" style="background-image: url('${item.poster}')"></div>
                <div class="movie-info">
                    <div class="movie-title">${escapeHtml(item.title)}</div>
                    <div class="movie-year">${item.year}</div>
                    <div class="movie-type">${item.type === 'movie' ? '🎬 Фильм' : '📺 Сериал'}</div>
                </div>
            </div>
        `).join('');
    }
    
    function openItem(id) {
        currentContent = contentDatabase.find(item => item.id === id);
        if (!currentContent) return;
        
        document.getElementById('detailTitle').innerText = currentContent.title;
        document.getElementById('detailDesc').innerText = currentContent.description;
        
        renderDomainSelector();
        renderIdSelector();
        
        const seriesControls = document.getElementById('seriesControls');
        
        if (currentContent.type === 'series') {
            seriesControls.style.display = 'block';
            renderSeasons();
            loadVideo();
        } else {
            seriesControls.style.display = 'none';
            loadVideo();
        }
        
        document.getElementById('playerModal').style.display = 'block';
    }
    
    // ========== ВЫБОР ДОМЕНА ==========
    function renderDomainSelector() {
        const container = document.getElementById('domainSelector');
        let html = '<span style="font-size: 13px; opacity: 0.7;">🌐 Плеер:</span>';
        
        PLAYER_DOMAINS.forEach(domain => {
            html += `<span class="domain-badge ${currentDomain.url === domain.url ? 'active' : ''}" onclick="selectDomain('${domain.url}')">
                ${domain.name}
            </span>`;
        });
        
        html += `<span style="font-size: 11px; opacity: 0.5; margin-left: 10px;">🔁 При ошибке смените домен</span>`;
        container.innerHTML = html;
    }
    
    function selectDomain(domainUrl) {
        const newDomain = PLAYER_DOMAINS.find(d => d.url === domainUrl);
        if (newDomain) {
            currentDomain = newDomain;
            renderDomainSelector();
            loadVideo(); // Перезагружаем видео с новым доменом
        }
    }
    
    // ========== ВЫБОР ТИПА ID ==========
    function renderIdSelector() {
        const container = document.getElementById('idSelector');
        const hasKp = !!currentContent.kp_id;
        const hasImdb = !!currentContent.imdb_id;
        const hasTmdb = !!currentContent.tmdb_id;
        
        let html = '<span style="font-size: 13px; opacity: 0.7;">🔑 ID:</span>';
        
        if (hasKp) {
            html += `<span class="id-badge ${currentIdType === 'kp_id' ? 'active' : ''}" onclick="selectIdType('kp_id')">KP: ${currentContent.kp_id}</span>`;
        }
        if (hasImdb) {
            html += `<span class="id-badge ${currentIdType === 'imdb_id' ? 'active' : ''}" onclick="selectIdType('imdb_id')">IMDB: ${currentContent.imdb_id}</span>`;
        }
        if (hasTmdb) {
            html += `<span class="id-badge ${currentIdType === 'tmdb_id' ? 'active' : ''}" onclick="selectIdType('tmdb_id')">TMDB: ${currentContent.tmdb_id}</span>`;
        }
        
        container.innerHTML = html;
    }
    
    function selectIdType(type) {
        currentIdType = type;
        renderIdSelector();
        loadVideo();
    }
    
    // ========== ЗАГРУЗКА ВИДЕО ==========
    function loadVideo(season = null, episode = null) {
        const playerUrl = getPlayerUrl(currentContent, currentIdType, currentDomain, season, episode);
        
        if (playerUrl) {
            console.log('Загрузка плеера:', playerUrl);
            document.getElementById('playerContainer').innerHTML = `
                <iframe 
                    src="${playerUrl}" 
                    allowfullscreen 
                    allow="autoplay *; fullscreen *"
                    onerror="handlePlayerError(this)"
                ></iframe>
            `;
            
            if (season && episode) {
                document.getElementById('detailTitle').innerText = `${currentContent.title} - Сезон ${season}, Серия ${episode}`;
            } else {
                document.getElementById('detailTitle').innerText = currentContent.title;
            }
        } else {
            showPlayerError();
        }
    }
    
    function handlePlayerError(iframe) {
        console.error('Ошибка загрузки плеера');
        showPlayerError();
    }
    
    function showPlayerError() {
        document.getElementById('playerContainer').innerHTML = `
            <div class="error-message">
                ⚠️ Не удалось загрузить плеер<br><br>
                <strong>Возможные решения:</strong><br>
                1. Попробуйте выбрать другой <strong>домен</strong> выше ☝️<br>
                2. Попробуйте выбрать другой <strong>тип ID</strong> (KP/IMDB/TMDB)<br>
                3. Проверьте интернет-соединение<br><br>
                <small style="opacity: 0.7;">Ошибка: ${currentDomain.url} не отвечает</small>
            </div>
        `;
    }
    
    // ========== СЕРИАЛЫ ==========
    function renderSeasons() {
        const container = document.getElementById('seriesControls');
        const seasonsCount = currentContent.seasons || 1;
        
        let html = `<div class="seasons-container">
            <h3>📺 Выберите сезон и серию</h3>
            <div class="season-tabs">`;
        
        for (let s = 1; s <= seasonsCount; s++) {
            html += `<button class="season-btn" onclick="selectSeason(${s})">Сезон ${s}</button>`;
        }
        
        html += `</div>
            <div id="episodesList" class="episodes-grid"></div>
        </div>`;
        
        container.innerHTML = html;
        selectSeason(1);
    }
    
    function selectSeason(season) {
        currentSeason = season;
        
        document.querySelectorAll('.season-btn').forEach((btn, idx) => {
            btn.classList.remove('active');
            if (idx + 1 === season) btn.classList.add('active');
        });
        
        const episodesCount = currentContent.episodes ? currentContent.episodes[season - 1] : 8;
        const episodesList = document.getElementById('episodesList');
        
        let html = '';
        for (let e = 1; e <= episodesCount; e++) {
            html += `<button class="episode-btn" onclick="playEpisode(${season}, ${e})">
                Серия ${e}
            </button>`;
        }
        episodesList.innerHTML = html;
    }
    
    function playEpisode(season, episode) {
        loadVideo(season, episode);
    }
    
    function closePlayer() {
        document.getElementById('playerModal').style.display = 'none';
        document.getElementById('playerContainer').innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; background: #000; color: #fff;">🎬 Плеер загружается...</div>';
        currentContent = null;
    }
    
    function filterContent(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.filter === type) btn.classList.add('active');
        });
        loadContent();
    }
    
    function searchMovies() {
        currentSearch = document.getElementById('searchInput').value;
        loadContent();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Инициализация
    loadContent();
    
    window.onclick = function(event) {
        const modal = document.getElementById('playerModal');
        if (event.target === modal) closePlayer();
    }
</script>
