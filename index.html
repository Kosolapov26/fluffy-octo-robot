<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieStream - Онлайн кинотеатр | Дипломный проект</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: rgba(15, 20, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,107,107,0.3);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #ff8e53);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
        }

        .search-box input {
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            background: #2a2f4a;
            color: #fff;
            width: 300px;
            outline: none;
        }

        .search-box input:focus {
            background: #3a3f5a;
            box-shadow: 0 0 0 2px #ff6b6b;
        }

        .filters {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            background: #2a2f4a;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn.active {
            background: #ff6b6b;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 30px;
            border-left: 4px solid #ff6b6b;
            padding-left: 20px;
        }

        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background: #151a36;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(255,107,107,0.3);
        }

        .movie-poster {
            position: relative;
            padding-top: 150%;
            background-size: cover;
            background-position: center;
            background-color: #2a2f4a;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .movie-year {
            font-size: 14px;
            color: #ff8e53;
        }

        .movie-type {
            display: inline-block;
            padding: 3px 8px;
            background: #ff6b6b;
            border-radius: 5px;
            font-size: 11px;
            margin-top: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1200px;
            margin: 30px auto;
            background: #0f142e;
            border-radius: 12px;
            overflow: hidden;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 25px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
            z-index: 10;
        }

        .close-modal:hover {
            color: #ff6b6b;
        }

        .player-container {
            width: 100%;
            background: #000;
            aspect-ratio: 16/9;
        }

        .player-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .movie-detail {
            padding: 20px;
        }

        .id-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
            padding: 15px;
            background: #1a1f3a;
            border-radius: 8px;
        }

        .id-btn {
            padding: 8px 16px;
            background: #2a2f4a;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .id-btn.active {
            background: #4caf50;
        }

        .id-btn:hover {
            background: #ff6b6b;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: #ff6b6b;
        }

        .error-box {
            background: #ff6b6b22;
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 20px;
            margin: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            .nav {
                flex-direction: column;
            }
            .search-box input {
                width: 100%;
            }
            .movies-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="nav">
        <div class="logo" onclick="loadMovies()">🎬 MovieStream</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск фильмов..." onkeyup="searchMovies()">
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="filterMovies('all')">Все</button>
            <button class="filter-btn" data-filter="movie" onclick="filterMovies('movie')">Фильмы</button>
            <button class="filter-btn" data-filter="series" onclick="filterMovies('series')">Сериалы</button>
        </div>
    </div>
</div>

<div class="container">
    <h2 class="section-title">🔥 Популярное</h2>
    <div id="moviesGrid" class="movies-grid">
        <div class="loader">Загрузка...</div>
    </div>
</div>

<div id="playerModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closePlayer()">&times;</span>
        <div id="playerContainer" class="player-container">
            <div style="display: flex; align-items: center; justify-content: center; height: 100%;">🎬 Выберите фильм</div>
        </div>
        <div class="movie-detail">
            <h2 id="detailTitle"></h2>
            <p id="detailDesc"></p>
            <div class="id-selector" id="idSelector">
                <span>🔑 Выберите ID для плеера:</span>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    // ВАШИ ДАННЫЕ ИЗ ТАБЛИЦЫ
    const MOVIE_DATA = {
        kp_id: "77509",
        imdb_id: "tt0164750", 
        tmdb_id: "90354",
        title: "Подручный якудза 2: Наемный убийца / Yakuza deka (1970)",
        poster: "https://image.tmdb.org/t/p/w500/placeholder.jpg",
        description: "Японский боевик 1970 года о приключениях полицейского под прикрытием в мире якудза."
    };
    
    // ВАШ ТОКЕН ДЛЯ ПЛЕЕРА
    const PLAYER_TOKEN = 'c9fe4f828ec190451e8bb5f66659838d';
    
    // ДОМЕН ПЛЕЕРА (используем tv-2-kinoserial.net как в документации)
    const PLAYER_DOMAIN = 'https://tv-2-kinoserial.net';
    
    // Дополнительные фильмы для теста
    const movieDatabase = [
        {
            id: 1,
            title: MOVIE_DATA.title,
            year: "1970",
            type: "movie",
            kp_id: MOVIE_DATA.kp_id,
            imdb_id: MOVIE_DATA.imdb_id,
            tmdb_id: MOVIE_DATA.tmdb_id,
            poster: "https://image.tmdb.org/t/p/w500/8uUU2QmX6hkNzM6QNd2MlQZKvWV.jpg",
            description: MOVIE_DATA.description
        },
        {
            id: 2,
            title: "Дюна: Часть вторая",
            year: "2024",
            type: "movie",
            kp_id: "1395833",
            imdb_id: "tt15239678",
            tmdb_id: "693134",
            poster: "https://image.tmdb.org/t/p/w500/8uUU2QmX6hkNzM6QNd2MlQZKvWV.jpg",
            description: "Продолжение эпической саги Пола Атрейдеса."
        },
        {
            id: 3,
            title: "Оппенгеймер",
            year: "2023",
            type: "movie",
            kp_id: "1090365",
            imdb_id: "tt15398776",
            tmdb_id: "872585",
            poster: "https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg",
            description: "История создателя атомной бомбы."
        },
        {
            id: 4,
            title: "Барби",
            year: "2023",
            type: "movie",
            kp_id: "974256",
            imdb_id: "tt1517268",
            tmdb_id: "346698",
            poster: "https://image.tmdb.org/t/p/w500/iuFNMS8U5cb6xfzi51Dbkovj7vM.jpg",
            description: "Фэнтези-комедия о культовой кукле."
        }
    ];
    
    let currentFilter = 'all';
    let currentSearch = '';
    let currentMovie = null;
    let currentIdType = 'kp_id';
    
    // ========== ФУНКЦИЯ ПОЛУЧЕНИЯ URL ПЛЕЕРА ==========
    // Используем embed_auto как в документации
    function getPlayerUrl(movie, idType) {
        let idValue = '';
        
        switch(idType) {
            case 'kp_id':
                idValue = movie.kp_id;
                break;
            case 'imdb_id':
                idValue = movie.imdb_id;
                break;
            case 'tmdb_id':
                idValue = `tmdb${movie.tmdb_id}`;
                break;
        }
        
        if (!idValue) {
            return null;
        }
        
        // Используем embed_auto как указано в FAQ
        return `${PLAYER_DOMAIN}/embed_auto/${idValue}/?token=${PLAYER_TOKEN}`;
    }
    
    // ========== ЗАГРУЗКА СПИСКА ФИЛЬМОВ ==========
    function loadMovies() {
        let filtered = [...movieDatabase];
        
        if (currentFilter !== 'all') {
            filtered = filtered.filter(m => m.type === currentFilter);
        }
        
        if (currentSearch) {
            filtered = filtered.filter(m => 
                m.title.toLowerCase().includes(currentSearch.toLowerCase())
            );
        }
        
        const grid = document.getElementById('moviesGrid');
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="loader">😔 Ничего не найдено</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(movie => `
            <div class="movie-card" onclick="openMovie(${movie.id})">
                <div class="movie-poster" style="background-image: url('${movie.poster}')"></div>
                <div class="movie-info">
                    <div class="movie-title">${escapeHtml(movie.title)}</div>
                    <div class="movie-year">${movie.year}</div>
                    <div class="movie-type">${movie.type === 'movie' ? '🎬 Фильм' : '📺 Сериал'}</div>
                </div>
            </div>
        `).join('');
    }
    
    function openMovie(id) {
        currentMovie = movieDatabase.find(m => m.id === id);
        if (!currentMovie) return;
        
        document.getElementById('detailTitle').innerHTML = currentMovie.title;
        document.getElementById('detailDesc').innerHTML = currentMovie.description;
        
        // Создаем кнопки выбора ID
        const idSelector = document.getElementById('idSelector');
        idSelector.innerHTML = `
            <span>🔑 Выберите ID для плеера:</span>
            <button class="id-btn ${currentIdType === 'kp_id' ? 'active' : ''}" onclick="selectIdType('kp_id')">
                KP: ${currentMovie.kp_id}
            </button>
            <button class="id-btn ${currentIdType === 'imdb_id' ? 'active' : ''}" onclick="selectIdType('imdb_id')">
                IMDB: ${currentMovie.imdb_id}
            </button>
            <button class="id-btn ${currentIdType === 'tmdb_id' ? 'active' : ''}" onclick="selectIdType('tmdb_id')">
                TMDB: ${currentMovie.tmdb_id}
            </button>
            <span style="margin-left: auto; font-size: 12px; opacity: 0.7;">🎬 ${PLAYER_DOMAIN}</span>
        `;
        
        // Загружаем видео
        loadVideo();
        
        // Показываем модальное окно
        document.getElementById('playerModal').style.display = 'block';
    }
    
    function selectIdType(type) {
        currentIdType = type;
        
        // Обновляем активную кнопку
        document.querySelectorAll('.id-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent.includes(type.toUpperCase())) {
                btn.classList.add('active');
            }
        });
        
        loadVideo();
    }
    
    function loadVideo() {
        const playerUrl = getPlayerUrl(currentMovie, currentIdType);
        const playerContainer = document.getElementById('playerContainer');
        
        if (playerUrl) {
            console.log('Загрузка плеера:', playerUrl);
            
            playerContainer.innerHTML = `
                <iframe 
                    src="${playerUrl}"
                    width="100%" 
                    height="100%" 
                    frameborder="0" 
                    allowfullscreen 
                    allow="autoplay *; fullscreen *"
                    onerror="handlePlayerError()"
                ></iframe>
            `;
            
            // Таймаут для проверки загрузки
            setTimeout(() => {
                const iframe = playerContainer.querySelector('iframe');
                if (iframe && !iframe.src.includes('embed_auto')) {
                    console.log('Плеер загружен');
                }
            }, 2000);
        } else {
            playerContainer.innerHTML = `
                <div class="error-box">
                    ⚠️ Не удалось сформировать URL для плеера<br>
                    <small>ID типа "${currentIdType}" не найден для этого фильма</small>
                </div>
            `;
        }
    }
    
    function handlePlayerError() {
        const playerContainer = document.getElementById('playerContainer');
        playerContainer.innerHTML = `
            <div class="error-box">
                ❌ Ошибка загрузки плеера<br><br>
                <strong>Возможные причины:</strong><br>
                1. Домен ${PLAYER_DOMAIN} может быть заблокирован в вашей сети<br>
                2. Попробуйте выбрать другой тип ID (KP/IMDB/TMDB)<br>
                3. Проверьте интернет-соединение<br><br>
                <small>💡 Для просмотра в дипломе: используйте тестовое видео ниже</small>
                <br><br>
                <button onclick="loadTestVideo()" style="padding: 10px 20px; background: #ff6b6b; border: none; color: white; border-radius: 8px; cursor: pointer;">
                    ▶ Загрузить тестовое видео
                </button>
            </div>
        `;
    }
    
    function loadTestVideo() {
        const playerContainer = document.getElementById('playerContainer');
        playerContainer.innerHTML = `
            <video controls autoplay style="width:100%; height:100%;">
                <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
                Ваш браузер не поддерживает видео
            </video>
        `;
    }
    
    function closePlayer() {
        document.getElementById('playerModal').style.display = 'none';
        document.getElementById('playerContainer').innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%;">🎬 Выберите фильм</div>';
        currentMovie = null;
    }
    
    function filterMovies(type) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.filter === type) btn.classList.add('active');
        });
        loadMovies();
    }
    
    function searchMovies() {
        currentSearch = document.getElementById('searchInput').value;
        loadMovies();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Запуск
    loadMovies();
    
    // Закрытие по клику вне контента
    window.onclick = function(event) {
        const modal = document.getElementById('playerModal');
        if (event.target === modal) closePlayer();
    }
</script>

</body>
</html>
