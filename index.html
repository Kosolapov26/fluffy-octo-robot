<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KinoGorilla — смотреть фильмы и сериалы онлайн</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="nav">
        <a href="index.html" class="logo">🦍 KinoGorilla</a>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск фильмов..." onkeyup="filterMovies()">
        </div>
        <div class="filters">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Все</button>
            <button class="filter-btn" data-filter="movie" onclick="setFilter('movie')">Фильмы</button>
            <button class="filter-btn" data-filter="series" onclick="setFilter('series')">Сериалы</button>
        </div>
    </div>
</div>

<div class="container">
    <h2 class="section-title">🔥 Популярное сегодня</h2>
    <div id="moviesGrid" class="movies-grid">
        <div class="loader">🎬 Загрузка...</div>
    </div>
</div>

<div class="footer">
    <p>🦍 KinoGorilla — лучшие фильмы и сериалы в HD качестве</p>
</div>

<script src="data.js"></script>
<script>
    let currentFilter = 'all';
    let currentSearch = '';

    function filterMovies() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        renderMovies();
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.filter === filter) btn.classList.add('active');
        });
        renderMovies();
    }

    function renderMovies() {
        let filtered = MOVIES_LIST.filter(m => {
            if (currentFilter !== 'all' && m.type !== currentFilter) return false;
            if (currentSearch && !m.title.toLowerCase().includes(currentSearch)) return false;
            return true;
        });

        const grid = document.getElementById('moviesGrid');
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="loader">😔 Ничего не найдено</div>';
            return;
        }

        grid.innerHTML = filtered.map(movie => `
            <a href="${movie.id}.html" class="movie-card">
                <div class="movie-poster" style="background-image: url('${movie.poster}')">
                    <div class="play-overlay">▶</div>
                </div>
                <div class="movie-info">
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-year">${movie.year}</div>
                    <div class="movie-type">${movie.type === 'movie' ? '🎬 Фильм' : '📺 Сериал'}</div>
                </div>
            </a>
        `).join('');
    }

    renderMovies();
</script>

</body>
</html>
